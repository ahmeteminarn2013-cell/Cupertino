# NexusDock — macOS buzlu cam (frosted glass) için picom ayarı
# XFCE compositing'i kapatıp bunu kullanıyoruz. blur = dual_kawase.

backend = "glx";
vsync = true;
use-damage = true;

# ---------------- Yuvarlak köşeler: SADECE alt dock ----------------
# Global corner-radius + exclude (corner-radius-rules picom 10.2'de yok).
# Sadece Xfce4-panel && y>=100 (alt dock) yuvarlanır; gerisi hariç.
corner-radius = 22;
rounded-corners-exclude = [
  "class_g != 'Xfce4-panel'",
  "class_g = 'Xfce4-panel' && y < 100"
];

# ---------------- Blur (arka plan buzlu cam) ----------------
blur-method = "dual_kawase";
blur-strength = 2.5;          # <<< blur şiddeti
blur-background = true;
blur-background-frame = false;
# SADECE üst paneli blur'la — Plank, terminal, metin pencereleri vs. blur ALMAZ
# NOT: panel'in class_g'si BÜYÜK X ile "Xfce4-panel" (WM_CLASS ikinci değeri)
blur-background-exclude = [
  "class_g != 'Xfce4-panel'"
];

# ---------------- Hafif macOS gölgeleri ----------------
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.30;
shadow-offset-x = -16;
shadow-offset-y = -16;
shadow-exclude = [
  "class_g = 'Plank'",
  "window_type = 'desktop'",
  "window_type = 'dnd'"
];

# ---------------- Diğer ----------------
fading = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
